name: Code Quality Check

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven   # 🔥 built-in cache (no need for separate cache step)

      - name: Verify Build (compile)
        run: mvn clean compile

      - name: Run Lint (Checkstyle)
        run: mvn checkstyle:check

      - name: Run Unit Tests (JUnit)
        run: mvn test
